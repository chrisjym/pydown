<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>pydown — file to Markdown</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>pydown</h1>
        <p class="subtitle">Drop a file — a Markdown file downloads.</p>
      </header>

      <div
        id="dropzone"
        class="dropzone"
        tabindex="0"
        role="button"
        aria-label="Drop a file or click to browse"
      >
        <div class="dropzone-inner">
          <p class="dropzone-title">Drag &amp; drop a file here</p>
          <p class="dropzone-hint">or click to browse</p>
          <p class="dropzone-formats">
            Supported: {{ extensions | join(', ') }}
          </p>
        </div>
        <input
          type="file"
          id="fileInput"
          class="file-input"
          accept="{{ extensions | join(',') }}"
        />
      </div>

      <div id="status" class="status" hidden></div>
      <div id="success" class="success" hidden></div>
      <div id="error" class="error" hidden></div>

      <hr />

      <div class="faq">
        <button>About</button> <button>Contact</button> <button>OP.GG</button>
      </div>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
